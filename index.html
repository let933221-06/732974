<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Messenger</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Bạn bè</h2>

<input id="friendInput" placeholder="Tên bạn">
<button onclick="addFriend()">Thêm</button>

<div id="friendList"></div>

<hr>

<h3>Chat người lạ</h3>

<input id="strangerInput" placeholder="Tên người lạ">
<button onclick="chatStranger()">Chat</button>

<br><br>

<button onclick="toggleDark()">Dark Mode</button>

</div>


<div class="chat">

<div class="header" id="chatHeader">
Chọn người để chat
</div>

<div class="chat-box" id="chatBox"></div>

<div class="emoji">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('❤️')">❤️</span>
<span onclick="addEmoji('👍')">👍</span>
</div>

<div class="chat-input">

<input id="messageInput" placeholder="Nhập tin nhắn...">

<input type="file" id="imageInput">

<button onclick="sendMessage()">➤</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
